name: Daily Macro Refresh

on:
  schedule:
    - cron: '0 9 * * *'   # 9:00 AM UTC every day
  workflow_dispatch:        # Allows manual run from GitHub website

jobs:
  refresh:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - run: pip install -r requirements.txt

      - name: Fetch latest data
        env:
          FRED_API_KEY: ${{ secrets.FRED_API_KEY }}
        run: python data_fetcher.py

      - name: Commit updated data
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          git add data/
          git diff --quiet && git diff --staged --quiet || git commit -m "Update macro data $(date +%Y-%m-%d)"
          git push
